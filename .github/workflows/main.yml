name: Terraform-Infra-Workflow
on: 
  workflow_dispatch
  # push:
  #   branches:
  #     - main

defaults:
  run:
    working-directory: Enviornment/Dev

permissions:
  id-token: write       # Required for Azure OIDC login
  contents: read        # Required to download Terraform code

jobs:
  terraform-init-plan:
    runs-on: self-hosted
    name: terraform-init-plan
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.0

    - name: Azure Login
      uses: Azure/login@v2.3.0
      with:
       client-id: '55cc1ffa-b23e-4465-8021-8e99522815db'
       tenant-id: '0c30cc1a-956a-4c45-9571-96bfaa75a9af'
       subscription-id: 'de1c1815-4f90-412b-9551-d55f0de9407d'
        
      
    - name: Terraform fmt
      id: fmt
      run: terraform fmt -check
      continue-on-error: true
      working-directory: Enviornment/Dev
        
    - name: Terraform Init
      id: init
      run: terraform init -input=false  
      working-directory: Enviornment/Dev

    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color
      working-directory: Enviornment/Dev        
      
    - name: Terraform Plan
      id: plan
      run: terraform plan -no-color -input=false
      continue-on-error: true
      working-directory: Enviornment/Dev  
        
  terraform-apply:    
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    needs: terraform-init-plan
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.0

    - name: Azure Login
      uses: Azure/login@v2.3.0
      with:
       client-id: '55cc1ffa-b23e-4465-8021-8e99522815db'
       tenant-id: '0c30cc1a-956a-4c45-9571-96bfaa75a9af'
       subscription-id: 'de1c1815-4f90-412b-9551-d55f0de9407d'
          
    - name: Terraform Init
      id: init
      run: terraform init -input=false  
      working-directory: Enviornment/Dev

    - name: Terraform Apply
      id: apply
      run: terraform apply --auto-approve
      continue-on-error: true
      working-directory: Enviornment/Dev              
         
      


    
        
