name: Terraform-Infra-Workflow
on: 
  workflow_dispatch
  # push:
  #   branches:
  #     - main

defaults:
  run:
    working-directory: environments/dev
    
permissions:
  id-token: write
  contents: read
  
jobs:
  planning-job:
    runs-on: self-hosted
    name: first job
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: '55cc1ffa-b23e-4465-8021-8e99522815db'
          tenant-id: '0c30cc1a-956a-4c45-9571-96bfaa75a9af'
          subscription-id: 'de1c1815-4f90-412b-9551-d55f0de9407d'
          
      - name: Allow PowerShell scripts to run
        run: Set-ExecutionPolicy Bypass -Scope Process -Force
        shell: powershell
        
      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check
        continue-on-error: true
      
      - name: Terraform Init
        id: init
        run: terraform init -input=false
      
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
      
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true
        
      # - name: Terraform Apply
      #   id: apply
      #   if: ${{ github.ref == 'refs/heads/main' }}  # only apply from main branch
      #   run: terraform apply -auto-approve tfplan

  Apply-job:
    runs-on: self-hosted
    name: apply job
    needs: planning-job
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: '55cc1ffa-b23e-4465-8021-8e99522815db'
          tenant-id: '0c30cc1a-956a-4c45-9571-96bfaa75a9af'
          subscription-id: 'de1c1815-4f90-412b-9551-d55f0de9407d'  
      
      - name: Terraform Init
        id: init
        run: terraform init -input=false
        
      - name: Terraform Apply
        id: apply
        # if: ${{ github.ref == 'refs/heads/main' }}
        run: terraform apply -auto-approve
      
        
